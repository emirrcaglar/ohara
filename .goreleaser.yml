version: 2

before:
  hooks:
    - npm --prefix src/frontend ci
    - npm --prefix src/frontend run build:embed

builds:
  - id: ohara
    main: ./cmd
    binary: ohara
    dir: src/backend
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: ohara
    formats: tar.gz
    # Use zip for Windows
    format_overrides:
      - goos: windows
        formats: zip
    name_template: "ohara_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - readme.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    include:
      - '^feat(\([^)]+\))?!?: .+$'
      - '^fix(\([^)]+\))?!?: .+$'
  groups:
    - title: Features
      regexp: '^.*?feat(\([^)]+\))?!?: .+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([^)]+\))?!?: .+$'
      order: 1

release:
  github:
    owner: emirrcaglar
    name: ohara
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Version}}"
  mode: replace
  header: |
    Install via: `curl -sSL https://raw.githubusercontent.com/emirrcaglar/ohara/main/install.sh | bash`
