<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohara Reader</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            height: 100vh;
            overflow: hidden;
        }

        .reader-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
        }

        .image-wrapper {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        #manga-page {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls {
            flex-shrink: 0;
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 10px 0;
        }
    </style>
</head>

<body>
    <a href="/manga/library" class="nav-link">&#8592; Library</a>
    <div class="reader-container">
        <div class="image-wrapper">
            <img id="manga-page" src="" alt="">
        </div>
        <div class="controls">
            <button id="prev-btn">Previous</button>
            <span id="page-counter" style="align-content: center; font-size: 1.2rem;">Page 0</span>
            <button id="next-btn">Next</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const manga = params.get('manga');
        let page = parseInt(params.get('page') || '0');
        const total = parseInt(params.get('total') || '0');

        const img = document.getElementById('manga-page');
        const counter = document.getElementById('page-counter');

        function showPage(newPage) {
            newPage = Math.max(0, Math.min(newPage, total - 1));
            if (newPage === page && img.src) return;

            const newSrc = `/manga/${manga}/page/${newPage}`;

            const preload = new Image();
            preload.onload = () => {
                img.src = newSrc;
                page = newPage;
                counter.textContent = `Page ${page}`;
                window.history.pushState({ page }, '', `/reader?manga=${manga}&page=${page}&total=${total}`);
            };
            preload.src = newSrc;

            // save progress server-side (fire and forget)
            fetch(`/manga/${manga}/snippet/${newPage}`);
        }

        document.getElementById('prev-btn').addEventListener('click', () => showPage(page - 1));
        document.getElementById('next-btn').addEventListener('click', () => showPage(page + 1));

        window.addEventListener('popstate', (e) => {
            if (e.state) showPage(e.state.page);
        });

        // initial load (no preload needed, browser handles it)
        img.src = `/manga/${manga}/page/${page}`;
        counter.textContent = `Page ${page}`;
    </script>
</body>

</html>
