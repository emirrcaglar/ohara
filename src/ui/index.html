<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohara Reader</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script>

        document.addEventListener('DOMContentLoaded', function () {

            const params = new URLSearchParams(window.location.search);
            const manga = params.get('manga');
            const page = parseInt(params.get('page') || '0');

            const mangaEncoded = encodeURIComponent(manga);

            const img = document.getElementById('manga-page');
            img.src = `/manga/${mangaEncoded}/page/${page}`;

            const counter = document.getElementById('page-counter');
            counter.textContent = `Page ${page}`;

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.setAttribute('hx-get', `/manga/${mangaEncoded}/snippet/${Math.max(0, page - 1)}`);
            nextBtn.setAttribute('hx-get', `/manga/${mangaEncoded}/snippet/${page + 1}`);

            htmx.process(document.body);

            document.body.addEventListener('htmx:afterSettle', function (event) {
                const img = document.getElementById('manga-page');

                if (!img) {
                    return;
                }

                const match = img.src.match(/\/manga\/([^\/]+)\/page\/(\d+)/);

                if (match) {
                    const manga = match[1];
                    const page = match[2];

                    const newURL = `/?manga=${manga}&page=${page}`;
                    window.history.pushState({ manga, page }, '', newURL);

                    const counter = document.getElementById('page-counter');
                    if (counter) {
                        counter.textContent = `Page ${page}`;
                    }

                    const prevBtn = document.getElementById('prev-btn');
                    const nextBtn = document.getElementById('next-btn');
                    const currentPage = parseInt(page);

                    if (prevBtn && nextBtn) {
                        prevBtn.setAttribute('hx-get', `/manga/${manga}/snippet/${Math.max(0, currentPage - 1)}`);
                        nextBtn.setAttribute('hx-get', `/manga/${manga}/snippet/${currentPage + 1}`);

                        htmx.process(prevBtn);
                        htmx.process(nextBtn);
                    }
                }
            });

            window.addEventListener('popstate', function (event) {
                if (event.state) {
                    const img = document.getElementById('manga-page');
                    img.src = `/manga/${event.state.manga}/page/${event.state.page}`;

                    const counter = document.getElementById('page-counter');
                    counter.textContent = `Page ${event.state.page}`;
                }
            });
        });
    </script>
    <style>
        body {
            height: 100vh;
            overflow: hidden;
        }

        .reader-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
        }

        .image-wrapper {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        #manga-page {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls {
            flex-shrink: 0;
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 10px 0;
        }
    </style>
</head>

<body>

    <a href="/library" class="nav-link">&#8592; Library</a>
    <div id="reader-ui" class="reader-container">
        <div id="image-container" class="image-wrapper">
            <img id="manga-page" src="" alt="">
        </div>

        <div class="controls">
            <button id="prev-btn" hx-target="#image-container" hx-swap="outerHTML">Previous</button>
            <span id="page-counter" style="align-content: center; font-size: 1.2rem;">Page 0</span>
            <button id="next-btn" hx-target="#image-container" hx-swap="outerHTML">Next</button>
        </div>
    </div>
</body>

</html>
